- name: Find managed stack markers
  ansible.builtin.find:
    paths: "{{ paasible_stacks_root }}"
    patterns: ".paasible-stack"
    file_type: file
    hidden: true
    recurse: true
  register: paasible_markers
  failed_when: false

- name: Compute remaining stack marker paths
  ansible.builtin.set_fact:
    _remaining_marker_paths: >-
      {{
        paasible_stacks.keys()
        | map('regex_replace', '^(.+)$', paasible_stacks_root ~ '/\1/.paasible-stack')
        | list
      }}
  when: paasible_markers.files | length > 0

- name: Slurp markers for removed stacks (capture ext nets before directory removal)
  ansible.builtin.slurp:
    src: "{{ item }}"
  loop: >-
    {{
      paasible_markers.files
      | map(attribute='path')
      | reject('search', '/traefik/')
      | list
      | difference(_remaining_marker_paths | default([]))
    }}
  register: _removed_stack_marker_slurps
  when: paasible_markers.files | length > 0
  failed_when: false

- name: Stop removed stacks
  community.docker.docker_compose_v2:
    project_src: "{{ item | dirname }}"
    state: absent
  loop: >-
    {{
      paasible_markers.files
      | map(attribute='path')
      | reject('search', '/traefik/')
      | list
    }}
  when:
    - paasible_markers.files | length > 0
    - (item | dirname | basename) not in paasible_stacks.keys()
  failed_when: false

- name: Remove removed stack directories
  ansible.builtin.file:
    path: "{{ item | dirname }}"
    state: absent
  loop: >-
    {{
      paasible_markers.files
      | map(attribute='path')
      | reject('search', '/traefik/')
      | list
    }}
  when:
    - paasible_markers.files | length > 0
    - (item | dirname | basename) not in paasible_stacks.keys()

- name: Collect all networks to manage
  ansible.builtin.set_fact:
    _all_networks: >-
      {{
        (paasible_stacks.values()
          | map(attribute='external_networks', default=[])
          | flatten
          | unique
          | list)
        +
        (paasible_stacks | dict2items
          | selectattr('value.skip_net', 'undefined')
          | map(attribute='key')
          | map('regex_replace', '$', '-net')
          | list)
      }}

- name: Create managed networks
  community.docker.docker_network:
    name: "{{ item }}"
    driver: bridge
    state: present
  loop: "{{ _all_networks }}"
  when: paasible_stacks | length > 0

- name: Compute previous stack network names (for cleanup)
  ansible.builtin.set_fact:
    _previous_stack_nets: >-
      {{
        paasible_markers.files
        | map(attribute='path')
        | map('dirname')
        | map('basename')
        | map('regex_replace', '$', '-net')
        | list
      }}
  when: paasible_markers.files | length > 0

- name: Ensure destination directory exists
  ansible.builtin.file:
    path: "{{ paasible_stacks_root }}/{{ item.key }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ paasible_stacks | dict2items }}"
  when: paasible_stacks | length > 0

- name: Sync user stack directory
  ansible.builtin.synchronize:
    src: "{{ paasible_stacks_dir }}/{{ item.value.template | default(item.key) }}/"
    dest: "{{ paasible_stacks_root }}/{{ item.key }}/"
    delete: true
    recursive: true
    rsync_opts:
      - "--exclude=.env"
      - "--exclude=*.sqlite3"
      - "--exclude=.gitkeep"
      - "--exclude=labels.yml"
  loop: "{{ paasible_stacks | dict2items }}"
  when: paasible_stacks | length > 0

- name: Generate stack overlay (networks + routing)
  ansible.builtin.template:
    src: labels.yml.j2
    dest: "{{ paasible_stacks_root }}/{{ item.key }}/labels.yml"
    mode: '0644'
  vars:
    stack_name: "{{ item.key }}"
    stack: "{{ item.value }}"
    stack_dir: "{{ paasible_stacks_dir }}/{{ item.value.template | default(item.key) }}"
  loop: "{{ paasible_stacks | dict2items }}"
  when: paasible_stacks | length > 0

- name: Write .env file from stack env vars
  ansible.builtin.copy:
    content: |
      {% for key, value in item.value.env.items() %}
      {{ key }}={{ value }}
      {% endfor %}
    dest: "{{ paasible_stacks_root }}/{{ item.key }}/.env"
    owner: root
    group: root
    mode: '0600'
  loop: "{{ paasible_stacks | dict2items }}"
  when: paasible_stacks | length > 0 and item.value.env is defined and item.value.env | length > 0

- name: Deploy user stacks
  community.docker.docker_compose_v2:
    project_src: "{{ paasible_stacks_root }}/{{ item.key }}"
    files:
      - docker-compose.yml
      - labels.yml
    state: present
    recreate: "{{ paasible_stack_recreate | default('auto') }}"
    pull: missing
    remove_orphans: true
  loop: "{{ paasible_stacks | dict2items }}"
  when: paasible_stacks | length > 0
  tags:
    - app

- name: Write stack marker
  ansible.builtin.copy:
    dest: "{{ paasible_stacks_root }}/{{ item.key }}/.paasible-stack"
    content: >-
      {{
        {
          'stack': item.key,
          'external_networks': item.value.external_networks | default([])
        } | to_json
      }}
    mode: '0644'
  loop: "{{ paasible_stacks | dict2items }}"
  when: paasible_stacks | length > 0

- name: Deploy Traefik
  block:
    - name: Render Traefik static config
      ansible.builtin.template:
        src: traefik.yml.j2
        dest: "{{ paasible_stacks_root }}/traefik/traefik.yml"
        mode: '0644'

    - name: Render Traefik compose
      ansible.builtin.template:
        src: traefik-compose.yml.j2
        dest: "{{ paasible_stacks_root }}/traefik/docker-compose.yml"
        mode: '0644'

    - name: Ensure Traefik dynamic directory exists
      ansible.builtin.file:
        path: "{{ paasible_stacks_root }}/traefik/dynamic"
        state: directory
        mode: '0755'

    - name: Deploy Traefik stack
      community.docker.docker_compose_v2:
        project_src: "{{ paasible_stacks_root }}/traefik"
        state: present
        recreate: auto
      environment:
        CF_DNS_API_TOKEN: "{{ paasible_traefik_cf_token }}"
  when: paasible_traefik_enabled | bool and paasible_stacks | length > 0

- name: Remove orphaned networks (stacks that were removed)
  community.docker.docker_network:
    name: "{{ item }}"
    state: absent
  loop: "{{ _previous_stack_nets | difference(_all_networks) }}"
  when:
    - paasible_markers.files | length > 0
    - (_previous_stack_nets | difference(_all_networks)) | length > 0

- name: Compute orphaned external networks from removed stacks
  ansible.builtin.set_fact:
    _orphaned_ext_nets: >-
      {{
        (_removed_stack_marker_slurps.results | default([])
          | selectattr('content', 'defined')
          | map(attribute='content')
          | map('b64decode')
          | map('regex_replace', '^(?!\{).*$', '{}')
          | map('from_json')
          | map(attribute='external_networks', default=[])
          | flatten | unique | list)
        | difference(
            paasible_stacks.values()
            | map(attribute='external_networks', default=[])
            | flatten | unique | list
          )
      }}
  when: _removed_stack_marker_slurps is defined

- name: Remove orphaned external networks
  community.docker.docker_network:
    name: "{{ item }}"
    state: absent
  loop: "{{ _orphaned_ext_nets | default([]) }}"
  when: (_orphaned_ext_nets | default([])) | length > 0

- name: Compute networks to remove (from markers) when all stacks removed
  ansible.builtin.set_fact:
    _networks_to_remove: >-
      {{
        paasible_markers.files
        | map(attribute='path')
        | map('dirname')
        | map('basename')
        | map('regex_replace', '$', '-net')
        | list
      }}
  when: paasible_stacks | length == 0

- name: Stop Traefik before network teardown
  community.docker.docker_compose_v2:
    project_src: "{{ paasible_stacks_root }}/traefik"
    state: absent
  when:
    - paasible_stacks | length == 0
    - paasible_traefik_enabled | bool

- name: Remove managed networks when all stacks removed
  community.docker.docker_network:
    name: "{{ item }}"
    state: absent
  loop: "{{ _networks_to_remove | default([]) }}"
  when: paasible_stacks | length == 0

- name: Ensure Traefik is disabled
  block:
    - name: Check if Traefik directory exists
      ansible.builtin.stat:
        path: "{{ paasible_stacks_root }}/traefik"
      register: traefik_dir

    - name: Stop Traefik stack
      community.docker.docker_compose_v2:
        project_src: "{{ paasible_stacks_root }}/traefik"
        state: absent
      when: traefik_dir.stat.exists

    - name: Remove Traefik directory
      ansible.builtin.file:
        path: "{{ paasible_stacks_root }}/traefik"
        state: absent
      when: traefik_dir.stat.exists
  when: not (paasible_traefik_enabled | bool)
