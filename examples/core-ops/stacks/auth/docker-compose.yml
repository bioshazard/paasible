volumes:
  lldap-data:
  authelia-data:

services:
  lldap:
    image: lldap/lldap:stable
    restart: unless-stopped
    volumes:
      - lldap-data:/data
    environment:
      LLDAP_JWT_SECRET: "${LLDAP_JWT_SECRET}"
      LLDAP_KEY_SEED: "${LLDAP_KEY_SEED}"
      LLDAP_LDAP_USER_PASS: "${LLDAP_ADMIN_PASSWORD}"
      LLDAP_LDAP_BASE_DN: "dc=example,dc=com"
      LLDAP_LDAP_USER_EMAIL: "admin@example.com"
      LLDAP_HTTP_URL: "https://lldap.${PAASIBLE_BASE}"
    x-paasible:
      routes:
        - port: 17170
          subdomain: lldap

  authelia:
    image: authelia/authelia:latest
    restart: unless-stopped
    volumes:
      - ./config:/config
      - authelia-data:/data
    environment:
      AUTHELIA_SESSION_SECRET: "${SESSION_SECRET}"
      AUTHELIA_STORAGE_ENCRYPTION_KEY: "${STORAGE_ENCRYPTION_KEY}"
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: "${IDENTITY_VALIDATION_JWT_SECRET}"
      AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD: "${LLDAP_ADMIN_PASSWORD}"
    x-paasible:
      routes:
        - port: 9091
          subdomain: authelia
    depends_on:
      - lldap
