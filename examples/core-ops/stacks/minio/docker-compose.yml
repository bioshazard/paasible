services:
  minio:
    image: quay.io/minio/minio:latest
    x-paasible:
      routes:
        - port: 9000
          subdomain: minio
        - port: 9001
          subdomain: minio-console
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER
      - MINIO_ROOT_PASSWORD
      - MINIO_SERVER_URL
      - MINIO_BROWSER_REDIRECT_URL
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 20s
      retries: 10

volumes:
  minio-data: